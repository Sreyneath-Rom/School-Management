# Reverse proxy for the API. Terminate TLS upstream (e.g. via a managed
# load balancer or certbot-managed cert) — this config is HTTP-only and
# assumes TLS termination happens before traffic reaches this container.
server {
    listen 80;
    server_name _;

    client_max_body_size 12m;

    location /api/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api-docs {
        proxy_pass http://api:5000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://api:5000;
    }
}
