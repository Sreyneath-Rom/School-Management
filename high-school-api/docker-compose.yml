services:
  api:
    build: .
    container_name: high-school-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Overrides the .env value: inside Docker, Postgres is reachable at the
      # service name "postgres", not "localhost". Credentials still come from
      # the same POSTGRES_* vars in .env, so they can't drift out of sync
      # with the postgres service below.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-high_school_db}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    networks:
      - school-network

  postgres:
    image: postgres:16-alpine
    container_name: high-school-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-high_school_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - school-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: high-school-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - school-network

  nginx:
    image: nginx:alpine
    container_name: high-school-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - school-network

volumes:
  postgres_data:
  uploads:
  logs:

networks:
  school-network:
    driver: bridge
